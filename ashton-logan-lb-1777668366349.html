.footer-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
}
.footer-tagline {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-dim);
}

.footer-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.footer-instagram {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--fg-muted);
  transition: color 0.2s;
}
.footer-instagram:hover { color: var(--accent); }
.footer-instagram svg { width: 17px; height: 17px; fill: currentColor; }

.footer-built {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--fg-dim);
}
.footer-built a {
  color: var(--accent);
  font-weight: 600;
  transition: color 0.2s;
}
.footer-built a:hover { color: var(--accent-hover); }

.footer-bottom {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
