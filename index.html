<!DOCTYPE html>
<!--
REASONING LOG — Logan Brands Site Generation Agent

ATHLETE READ:
Ashton Logan is a punter at MTSU — a specialist. Specialists are often overlooked but carry enormous mental responsibility. The punter controls field position, changes momentum, and performs under pressure without the glory of skill positions. This calls for a site that feels precise, confident, and quietly powerful — not loud or chaotic.

AESTHETIC DECISION:
Punters are cerebral athletes. The brand should feel intentional and premium — like someone who does their job with surgical precision. Not flashy. Not aggressive. Refined, controlled, with quiet authority.

PALETTE CHOSEN: Void (#080808 / #f0ede8 / #c8a96e)
WHY: The deep black base communicates seriousness and elite focus. The warm off-white and gold accent feel premium without being garish — this is a specialist who earns respect, not a player chasing highlight reels.

FONT PAIR CHOSEN: Cormorant Garamond + Inter
WHY: Cormorant gives editorial elegance — this is a thinker, a craftsman. Inter keeps it grounded and modern for body text and UI elements. The contrast mirrors the duality of a specialist: art and precision together.

STATS DECISION: include_stats = false
No stats displayed. Hero power statement leads with the narrative angle: field position control, hang time, and mental toughness under pressure.

SECTIONS INCLUDED:
- Hero (full viewport, name massive, narrative-led power statement)
- NIL/Contact form
- Footer with Instagram + Logan Brands credit

SECTIONS EXCLUDED:
- Bio (no bio provided)
- Highlights (no highlights data provided)
- Stats (explicitly excluded per Stats Decision)
-->

<style>
  /* ============================================================

  ============================================================ */
  :root {

  }

  [data-palette="chalk"] {

  }
  [data-palette="storm"] {
    --bg:       #1a1f2e;
    --surface:  #222840;
    --surface2: #2a3050;
    --fg:       #d1d9e6;
    --fg-muted: #7a8aaa;
    --accent:   #f59e0b;

  [data-palette="linen"] {

  /* FONT ALTERNATES — toggled by customizer */
  [data-font="athletic"] {
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'Inter', sans-serif;
  }
  [data-font="editorial"] {

  /* ============================================================
     RESET & BASE
  ============================================================ */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
  }

  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;

    transition: background-color 0.4s ease, color 0.4s ease;
  }

  img {
    display: block;
    max-width: 100%;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button {
    cursor: pointer;
    border: none;
    background: none;

  }

  /* ============================================================
     UTILITY
  ============================================================ */
  .container {
    width: 100%;
    max-width: var(--container);
    margin-left: auto;
    margin-right: auto;
    padding-left: var(--gutter);
    padding-right: var(--gutter);
  }

  .accent-text {
    color: var(--accent);
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  /* ============================================================
     NAVIGATION — STICKY TOP BAR
  ============================================================ */
  #nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 900;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    background: transparent;
    transition: background 0.4s ease, backdrop-filter 0.4s ease;
  }

  #nav.scrolled {
    background: rgba(8, 8, 8, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-subtle);
  }

  [data-palette="studio"] #nav.scrolled,
  [data-palette="chalk"] #nav.scrolled,
  [data-palette="linen"] #nav.scrolled {
    background: rgba(250, 250, 248, 0.92);
  }

  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 var(--gutter);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: clamp(18px, 2vw, 22px);
    font-weight: 600;
    letter-spacing: 0.04em;

  }

  .nav-logo span {
    color: var(--accent);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;

  }

  .nav-links a:hover {
    color: var(--accent);
  }

  .nav-cta {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  }

  .nav-cta:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
  }

  /* HAMBURGER */
  .hamburger {
    display: none;

    gap: 5px;
    width: 32px;
    padding: 4px;
    background: none;
    border: none;

  }

  .hamburger span {
    display: block;

    background: var(--fg);
    transition: transform 0.3s ease, opacity 0.3s ease;
    transform-origin: center;
  }

  .hamburger.open span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }
  .hamburger.open span:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
  }
  .hamburger.open span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  /* MOBILE OVERLAY */
  #mobile-menu {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 950;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  #mobile-menu.open {
    opacity: 1;
    pointer-events: all;
  }

  #mobile-menu a {
    font-family: var(--font-display);
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 500;
    color: var(--fg);
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }

  #mobile-menu a:hover {
    color: var(--accent);
  }

  #mobile-menu .mobile-cta {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    padding: 16px 40px;
    margin-top: 16px;
    transition: background 0.2s ease;
  }

  /* ============================================================
     HERO — FULL VIEWPORT
  ============================================================ */
  #hero {
    position: relative;
    width: 100%;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-top: var(--nav-h);
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  /* Geometric field-inspired background */
  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(160deg, transparent 40%, rgba(200,169,110,0.04) 100%),
      radial-gradient(ellipse 80% 60% at 70% 50%, rgba(200,169,110,0.06) 0%, transparent 70%);
  }

  /* Yardage line motif */
  .hero-bg::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    opacity: 0.15;
  }

  .hero-lines {
    position: absolute;
    top: 0;
    right: clamp(80px, 15vw, 200px);
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, transparent 0%, var(--border-subtle) 30%, var(--border-subtle) 70%, transparent 100%);
  }

  .hero-lines::before,
  .hero-lines::after {
    content: '';
    position: absolute;
    top: 0;
    height: 100%;
    width: 1px;
    background: inherit;
  }

  .hero-lines::before { right: clamp(40px, 6vw, 80px); }
  .hero-lines::after  { right: clamp(-40px, -6vw, -80px); }

  .hero-content {
    position: relative;
    z-index: 10;
    padding-bottom: clamp(60px, 8vw, 100px);
    padding-left: var(--gutter);

    margin: 0 auto;

  .hero-label {

    gap: 12px;

    font-size: 11px;

    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: clamp(24px, 4vw, 40px);
  }

  .hero-label::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--accent);
  }

  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(72px, 14vw, 180px);

    color: var(--fg);

  .hero-name .first {

  .hero-bottom {

  .hero-statement p strong {
    color: var(--fg);

  }

  .hero-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
    flex-shrink: 0;
  }

  .hero-school-badge {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-muted);
    text-align: right;
  }

  .btn-primary {
    display: inline-block;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;

    background: var(--accent);

  }

  .btn-primary:hover {
    background: var(--accent-dark);

  .btn-outline {
    display: inline-block;
    font-family: var(--font-body);
    font-size: 12px;

    letter-spacing: 0.14em;

  }

  /* Scroll indicator */
  .hero-scroll {
    position: absolute;
    bottom: clamp(24px, 4vw, 40px);
    right: var(--gutter);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .hero-scroll span {
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-muted);
    writing-mode: vertical-rl;
    text-orientation: mixed;
  }

  .hero-scroll-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }

  @keyframes scrollLine {
    0%   { transform: scaleY(0); transform-origin: top; }
    50%  { transform: scaleY(1); transform-origin: top; }
    51%  { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* Marquee strip */
  .hero-marquee {
    position: relative;
    z-index: 10;
    overflow: hidden;
    border-top: 1px solid var(--border-subtle);
    margin-top: clamp(60px, 8vw, 100px);
    background: var(--surface);
    padding: 14px 0;
  }

  .marquee-track {
    display: flex;
    gap: 0;
    animation: marqueeScroll 20s linear infinite;
    white-space: nowrap;
  }

  .marquee-item {
    display: inline-flex;
    align-items: center;
    gap: 24px;
    padding: 0 32px;
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-muted);
    flex-shrink: 0;
  }

  .marquee-item::after {
    content: '';
    display: block;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  @keyframes marqueeScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ============================================================
     PHILOSOPHY SECTION (replaces stats — specialist angle)
  ============================================================ */
  #philosophy {
    padding: var(--section-pad) 0;
    position: relative;
    overflow: hidden;
  }

  #philosophy::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border-subtle);
  }

  .philosophy-inner {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: clamp(60px, 8vw, 120px);
    align-items: center;
  }

  .philosophy-left {
    position: relative;
  }

  .philosophy-number {
    font-family: var(--font-display);
    font-size: clamp(120px, 18vw, 220px);
    font-weight: 300;
    color: var(--border-subtle);
    line-height: 1;
    user-select: none;
    position: absolute;
    top: -40px;
    left: -20px;
    z-index: 0;
    border: none;
    background: none;
    -webkit-text-stroke: 1px var(--border);
    -webkit-text-fill-color: transparent;
  }

  .philosophy-heading {
    position: relative;
    z-index: 1;
  }

  .philosophy-eyebrow {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .philosophy-eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  .philosophy-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 500;
    line-height: 1.1;
    color: var(--fg);
    letter-spacing: -0.01em;
  }

  .philosophy-title em {
    font-style: italic;
    color: var(--accent);
  }

  .philosophy-right {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .philosophy-block {
    border-left: 1px solid var(--border);
    padding-left: 28px;
    transition: border-color 0.3s ease;
  }

  .philosophy-block:hover {
    border-color: var(--accent);
  }

  .philosophy-block h3 {
    font-family: var(--font-display);
    font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 600;
    color: var(--fg);
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }

  .philosophy-block p {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 300;
    color: var(--fg-muted);
    line-height: 1.75;
  }

  /* ============================================================
     SPECIALIST METRICS (visual only — no hard stats)
  ============================================================ */
  #metrics {
    padding: var(--section-pad) 0;
    background: var(--surface);
    position: relative;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
  }

  .metric-card {
    background: var(--surface);
    padding: clamp(40px, 5vw, 64px) clamp(24px, 3vw, 48px);
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: background 0.3s ease;
  }

  .metric-card:hover {
    background: var(--surface2);
  }

  .metric-icon {
    font-size: 24px;
    opacity: 0.6;
  }

  .metric-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .metric-title {
    font-family: var(--font-display);
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 600;
    color: var(--fg);
    line-height: 1.15;
  }

  .metric-desc {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 300;
    color: var(--fg-muted);
    line-height: 1.7;
  }

     NIL / CONTACT SECTION
  ============================================================ */
  #contact {
    padding: var(--section-pad) 0;
    position: relative;
  }

  #contact::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border-subtle);
  }

  .contact-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(60px, 8vw, 120px);
    align-items: start;
  }

  .contact-left {
    position: sticky;
    top: calc(var(--nav-h) + 40px);
  }

  .contact-eyebrow {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .contact-eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  .contact-heading {
    font-family: var(--font-display);
    font-size: clamp(40px, 5.5vw, 72px);
    font-weight: 500;
    color: var(--fg);
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }

  .contact-heading em {
    font-style: italic;
    color: var(--accent);
  }

  .contact-desc {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 300;
    color: var(--fg-muted);
    line-height: 1.75;
    margin-bottom: 40px;
    max-width: 420px;
  }

  .contact-social {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .contact-social a {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-muted);
    transition: color 0.2s ease;
  }

  .contact-social a:hover {
    color: var(--accent);
  }

  .social-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s ease;
  }
